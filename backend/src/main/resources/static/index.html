<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow · 员工任务管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#F7F5F2;--bg-warm:#F2EDE8;--card:#FFFFFF;--fg:#2D2A26;--fg-s:#5C5650;--muted:#9B9590;--accent:#7C9A82;--accent-l:#A8C4AD;--accent-bg:#EDF3EF;--amber:#D4A574;--amber-l:#F0DCC6;--amber-bg:#FDF6EE;--rose:#C48B8B;--rose-l:#E8C4C4;--rose-bg:#FDF0F0;--blue:#8BA7C4;--blue-l:#BFD0E4;--blue-bg:#EDF2F8;--border:#E8E4DF;--border-l:#F0EDEA;--sh-s:0 1px 3px rgba(45,42,38,.04);--sh-m:0 4px 12px rgba(45,42,38,.06);--sh-l:0 12px 32px rgba(45,42,38,.08);--sh-xl:0 20px 48px rgba(45,42,38,.1);--r-s:8px;--r-m:12px;--r-l:16px;--r-xl:20px;--sw:260px;--hh:72px;--tr:.25s cubic-bezier(.4,0,.2,1)}
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;overflow-x:hidden;min-height:100vh}
        .bg-d{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
        .bg-d::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(124,154,130,.06)0%,transparent 70%);animation:fb 20s ease-in-out infinite}
        .bg-d::after{content:'';position:absolute;bottom:-150px;left:-150px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(212,165,116,.05)0%,transparent 70%);animation:fb 25s ease-in-out infinite reverse}
        @keyframes fb{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}

        /* 登录页 */
        .login-overlay{position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .4s}
        .login-overlay.hidden{opacity:0;pointer-events:none}
        .login-box{background:var(--card);border-radius:var(--r-xl);box-shadow:var(--sh-xl);padding:48px 40px;width:400px;max-width:92vw;text-align:center}
        .login-logo{width:56px;height:56px;border-radius:var(--r-m);background:linear-gradient(135deg,var(--accent),var(--accent-l));display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;margin:0 auto 20px;box-shadow:0 4px 16px rgba(124,154,130,.3)}
        .login-box h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:4px}
        .login-box p.sub{font-size:13px;color:var(--muted);margin-bottom:28px}
        .lg-field{margin-bottom:18px;text-align:left}
        .lg-field label{display:block;font-size:13px;font-weight:500;color:var(--fg-s);margin-bottom:6px}
        .lg-field input{width:100%;height:44px;border:1px solid var(--border);border-radius:var(--r-s);padding:0 14px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--fg);outline:none;transition:all var(--tr)}
        .lg-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,154,130,.1);background:var(--card)}
        .lg-btn{width:100%;height:46px;border:none;border-radius:var(--r-s);background:var(--accent);color:#fff;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;transition:all var(--tr);box-shadow:0 4px 12px rgba(124,154,130,.25);margin-top:8px}
        .lg-btn:hover{background:#6E8B74;transform:translateY(-1px);box-shadow:0 6px 16px rgba(124,154,130,.3)}
        .lg-hint{font-size:12px;color:var(--muted);margin-top:16px}

        /* 侧边栏 */
        .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:var(--card);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform var(--tr)}
        .sidebar-hd{padding:28px 24px 20px;border-bottom:1px solid var(--border-l)}
        .sidebar-logo{display:flex;align-items:center;gap:12px}
        .sidebar-logo .li{width:40px;height:40px;border-radius:var(--r-m);background:linear-gradient(135deg,var(--accent),var(--accent-l));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:0 4px 12px rgba(124,154,130,.25)}
        .sidebar-logo .lt{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
        .sidebar-logo .ls{font-size:11px;color:var(--muted)}
        .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
        .nav-grp{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:12px 12px 8px}
        .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-s);color:var(--fg-s);cursor:pointer;transition:all var(--tr);font-size:14px;position:relative;margin-bottom:2px}
        .nav-item:hover{background:var(--bg-warm);color:var(--fg)}
        .nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
        .nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--accent)}
        .nav-item i{width:20px;text-align:center;font-size:15px}
        .nav-badge{margin-left:auto;background:var(--rose-bg);color:var(--rose);font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;min-width:20px;text-align:center}
        .sidebar-ft{padding:16px;border-top:1px solid var(--border-l)}
        .sidebar-user{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-s);cursor:pointer;transition:background var(--tr)}
        .sidebar-user:hover{background:var(--bg-warm)}
        .su-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--amber-l),var(--amber));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;flex-shrink:0}
        .su-info{flex:1;min-width:0}
        .su-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .su-role{font-size:11px;color:var(--muted)}

        /* 主区域 */
        .main-w{margin-left:var(--sw);min-height:100vh;position:relative;z-index:1}
        .top-h{position:sticky;top:0;height:var(--hh);background:rgba(247,245,242,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border-l);display:flex;align-items:center;padding:0 32px;z-index:50;gap:16px}
        .mob-btn{display:none;width:40px;height:40px;border:none;background:none;border-radius:var(--r-s);cursor:pointer;color:var(--fg-s);font-size:18px}
        .h-title{font-size:20px;font-weight:600;flex-shrink:0}
        .h-search{flex:1;max-width:420px;margin:0 auto;position:relative}
        .h-search input{width:100%;height:42px;border:1px solid var(--border);border-radius:21px;padding:0 16px 0 42px;font-size:13px;font-family:inherit;background:var(--card);color:var(--fg);outline:none;transition:all var(--tr)}
        .h-search input::placeholder{color:var(--muted)}
        .h-search input:focus{border-color:var(--accent-l);box-shadow:0 0 0 3px rgba(124,154,130,.1)}
        .h-search>i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
        .h-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
        .h-btn{width:40px;height:40px;border:none;background:none;border-radius:var(--r-s);cursor:pointer;color:var(--fg-s);font-size:16px;transition:all var(--tr);display:flex;align-items:center;justify-content:center;position:relative}
        .h-btn:hover{background:var(--bg-warm);color:var(--fg)}

        .pg-c{padding:28px 32px 40px}
        .pg-v{display:none;animation:fi .35s ease}.pg-v.active{display:block}
        @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        /* 统计卡 */
        .dg-greet{margin-bottom:28px}
        .dg-greet h2{font-size:26px;font-weight:700;margin-bottom:4px}
        .dg-greet p{font-size:14px;color:var(--muted)}
        .stats-g{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:28px}
        .st-card{background:var(--card);border-radius:var(--r-l);padding:24px;border:1px solid var(--border-l);box-shadow:var(--sh-s);transition:all var(--tr);cursor:default;position:relative;overflow:hidden}
        .st-card::after{content:'';position:absolute;top:0;right:0;width:100px;height:100px;border-radius:50%;opacity:.5;transform:translate(30%,-30%);transition:opacity var(--tr)}
        .st-card:hover{box-shadow:var(--sh-m);transform:translateY(-2px)}.st-card:hover::after{opacity:.7}
        .st-card.sage::after{background:radial-gradient(circle,rgba(124,154,130,.12),transparent)}
        .st-card.amber::after{background:radial-gradient(circle,rgba(212,165,116,.12),transparent)}
        .st-card.rose::after{background:radial-gradient(circle,rgba(196,139,139,.12),transparent)}
        .st-card.blue::after{background:radial-gradient(circle,rgba(139,167,196,.12),transparent)}
        .st-icon{width:44px;height:44px;border-radius:var(--r-m);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:16px}
        .st-icon.sage{background:var(--accent-bg);color:var(--accent)}.st-icon.amber{background:var(--amber-bg);color:var(--amber)}.st-icon.rose{background:var(--rose-bg);color:var(--rose)}.st-icon.blue{background:var(--blue-bg);color:var(--blue)}
        .st-val{font-size:32px;font-weight:700;line-height:1;margin-bottom:6px}
        .st-lbl{font-size:13px;color:var(--muted);margin-bottom:12px}
        .st-trend{font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;color:var(--accent)}

        /* 区块 */
        .dg-grid{display:grid;grid-template-columns:1fr 380px;gap:24px}
        .sec-card{background:var(--card);border-radius:var(--r-l);border:1px solid var(--border-l);box-shadow:var(--sh-s);overflow:hidden}
        .sec-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border-l)}
        .sec-title{font-size:15px;font-weight:600}
        .sec-act{font-size:13px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:inherit;font-weight:500}
        .sec-act:hover{text-decoration:underline}
        .sec-bd{padding:8px}

        /* 任务项 */
        .tk-item{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-radius:var(--r-m);cursor:pointer;transition:all var(--tr)}
        .tk-item:hover{background:var(--bg)}
        .tk-chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;transition:all var(--tr);display:flex;align-items:center;justify-content:center;margin-top:1px}
        .tk-chk:hover{border-color:var(--accent)}
        .tk-chk.on{background:var(--accent);border-color:var(--accent)}
        .tk-chk.on::after{content:'\f00c';font-family:'Font Awesome 6 Free';font-weight:900;font-size:10px;color:#fff}
        .tk-info{flex:1;min-width:0}
        .tk-name{font-size:14px;font-weight:500;margin-bottom:4px;transition:all var(--tr)}
        .tk-item.done .tk-name{text-decoration:line-through;color:var(--muted)}
        .tk-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted)}
        .tk-meta i{margin-right:3px;font-size:11px}
        .tk-pri{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;flex-shrink:0;margin-top:2px}
        .tk-pri.high{background:var(--rose-bg);color:var(--rose)}.tk-pri.medium{background:var(--amber-bg);color:var(--amber)}.tk-pri.low{background:var(--accent-bg);color:var(--accent)}

        /* 成员 */
        .tm-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r-m);transition:background var(--tr);cursor:default}
        .tm-item:hover{background:var(--bg)}
        .tm-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;flex-shrink:0}
        .tm-info{flex:1;min-width:0}
        .tm-name{font-size:13px;font-weight:500}
        .tm-tasks{font-size:12px;color:var(--muted)}
        .prog-w{margin-top:6px}
        .prog-bg{height:4px;background:var(--bg-warm);border-radius:2px;overflow:hidden}
        .prog-fill{height:100%;border-radius:2px;transition:width .8s ease}

        /* 筛选栏 */
        .filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
        .filter-spacer{flex:1}
        .filter-chip{height:34px;padding:0 16px;border:1px solid var(--border);border-radius:17px;background:var(--card);font-size:13px;font-family:inherit;color:var(--fg-s);cursor:pointer;transition:all var(--tr);display:flex;align-items:center;gap:6px}
        .filter-chip:hover{border-color:var(--accent-l);color:var(--accent)}
        .filter-chip.active{background:var(--accent-bg);border-color:var(--accent-l);color:var(--accent);font-weight:500}
        .btn-new{height:40px;padding:0 20px;border:none;border-radius:var(--r-s);background:var(--accent);color:#fff;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all var(--tr);box-shadow:0 4px 12px rgba(124,154,130,.2)}
        .btn-new:hover{background:#6E8B74;transform:translateY(-1px);box-shadow:0 6px 16px rgba(124,154,130,.28)}
        .btn-new i{font-size:12px}

        /* 表格 */
        .tt-wrap{background:var(--card);border-radius:var(--r-l);border:1px solid var(--border-l);box-shadow:var(--sh-s);overflow:hidden}
        .tt{width:100%;border-collapse:collapse}
        .tt th{padding:14px 20px;text-align:left;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border-l);background:var(--bg)}
        .tt td{padding:16px 20px;font-size:14px;border-bottom:1px solid var(--border-l);vertical-align:middle}
        .tt tr:last-child td{border-bottom:none}
        .tt tr:hover td{background:var(--bg)}
        .tt-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600}
        .tt-assignee{display:flex;align-items:center;gap:10px}
        .st-badge{font-size:12px;font-weight:500;padding:4px 12px;border-radius:6px;display:inline-block}
        .act-cell{display:flex;gap:6px}
        .act-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all var(--tr)}
        .act-btn:hover{background:var(--bg-warm);color:var(--fg);border-color:var(--accent-l)}
        .act-btn.del:hover{background:var(--rose-bg);color:var(--rose);border-color:var(--rose-l)}
        .act-btn.start:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-l)}
        .act-btn.pause:hover{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-l)}
        .act-btn.done:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-l)}
        .act-btn.reopen:hover{background:var(--bg-warm);color:var(--fg-s);border-color:var(--border)}

        /* 看板 */
        .kb-board{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;min-height:500px}
        .kb-col{background:var(--bg-warm);border-radius:var(--r-l);padding:16px;display:flex;flex-direction:column}
        .kb-col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 4px}
        .kb-col-title{font-size:13px;font-weight:600;color:var(--fg-s);display:flex;align-items:center;gap:8px}
        .kb-col-dot{width:8px;height:8px;border-radius:50%}
        .kb-col-cnt{font-size:12px;color:var(--muted);background:var(--card);padding:1px 8px;border-radius:10px}
        .kb-cards{flex:1;display:flex;flex-direction:column;gap:10px;min-height:100px}
        .kb-card{background:var(--card);border-radius:var(--r-m);padding:16px;box-shadow:var(--sh-s);border:1px solid var(--border-l);cursor:grab;transition:all var(--tr)}
        .kb-card:hover{box-shadow:var(--sh-m);transform:translateY(-1px)}
        .kb-card:active{cursor:grabbing}
        .kb-card-t{font-size:13px;font-weight:500;margin-bottom:10px;line-height:1.5}
        .kb-card-ft{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
        .kb-card-assignee{display:flex;align-items:center;gap:6px}
        .kb-card-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:600}
        .kb-add{width:100%;padding:10px;border:2px dashed var(--border);border-radius:var(--r-m);background:none;cursor:pointer;color:var(--muted);font-size:13px;font-family:inherit;transition:all var(--tr);margin-top:4px}
        .kb-add:hover{border-color:var(--accent-l);color:var(--accent);background:var(--accent-bg)}

        /* 日历 */
        .cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
        .cal-nav{display:flex;align-items:center;gap:16px}
        .cal-nav-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:var(--r-s);background:var(--card);cursor:pointer;color:var(--fg-s);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--tr)}
        .cal-nav-btn:hover{background:var(--bg-warm);border-color:var(--accent-l);color:var(--accent)}
        .cal-month{font-size:18px;font-weight:600;min-width:160px;text-align:center}
        .cal-grid{background:var(--card);border-radius:var(--r-l);border:1px solid var(--border-l);box-shadow:var(--sh-s);overflow:hidden}
        .cal-wk{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border-l)}
        .cal-wk div{padding:14px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
        .cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
        .cal-day{min-height:100px;padding:8px;border-right:1px solid var(--border-l);border-bottom:1px solid var(--border-l);transition:background var(--tr)}
        .cal-day:nth-child(7n){border-right:none}.cal-day:nth-last-child(-n+7){border-bottom:none}
        .cal-day:hover{background:var(--bg)}
        .cal-day.om{opacity:.35}
        .cal-day.today .dn{background:var(--accent);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
        .dn{font-size:13px;font-weight:500;color:var(--fg-s);margin-bottom:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
        .cal-ev{font-size:11px;padding:2px 6px;border-radius:4px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default;font-weight:500}

        /* 团队 */
        .tm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .tm-card{background:var(--card);border-radius:var(--r-l);border:1px solid var(--border-l);box-shadow:var(--sh-s);padding:28px 24px;text-align:center;transition:all var(--tr);cursor:default}
        .tm-card:hover{box-shadow:var(--sh-l);transform:translateY(-3px)}
        .tm-card-av{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700}
        .tm-card-name{font-size:16px;font-weight:600;margin-bottom:4px}
        .tm-card-role{font-size:13px;color:var(--muted);margin-bottom:20px}
        .tm-card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:20px;border-top:1px solid var(--border-l)}
        .tm-card-st{text-align:center}
        .tm-card-sv{font-size:18px;font-weight:700}
        .tm-card-sl{font-size:11px;color:var(--muted)}

        /* 模态框 */
        .modal-ov{position:fixed;inset:0;background:rgba(45,42,38,.3);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .3s}
        .modal-ov.active{opacity:1;visibility:visible}
        .modal{background:var(--card);border-radius:var(--r-xl);box-shadow:var(--sh-xl);width:520px;max-width:92vw;max-height:90vh;overflow-y:auto;transform:translateY(20px) scale(.97);transition:transform .3s}
        .modal-ov.active .modal{transform:translateY(0) scale(1)}
        .modal-hd{display:flex;align-items:center;justify-content:space-between;padding:24px 28px 16px}
        .modal-title{font-size:18px;font-weight:600}
        .modal-close{width:32px;height:32px;border:none;background:var(--bg-warm);border-radius:50%;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--tr)}
        .modal-close:hover{background:var(--rose-bg);color:var(--rose)}
        .modal-bd{padding:8px 28px 28px}
        .fg{margin-bottom:20px}
        .fl{display:block;font-size:13px;font-weight:500;color:var(--fg-s);margin-bottom:8px}
        .fi,.fs,.fta{width:100%;height:42px;border:1px solid var(--border);border-radius:var(--r-s);padding:0 14px;font-size:14px;font-family:inherit;color:var(--fg);background:var(--bg);outline:none;transition:all var(--tr)}
        .fta{height:100px;padding:12px 14px;resize:vertical}
        .fi:focus,.fs:focus,.fta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,154,130,.1);background:var(--card)}
        .fr{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .fbtn{height:44px;border:none;border-radius:var(--r-s);padding:0 24px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:all var(--tr)}
        .fbtn.pri{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(124,154,130,.25)}
        .fbtn.pri:hover{background:#6E8B74;transform:translateY(-1px)}
        .fbtn.sec{background:var(--bg-warm);color:var(--fg-s)}
        .fbtn.sec:hover{background:var(--border)}
        .f-acts{display:flex;gap:12px;justify-content:flex-end;padding-top:8px}

        /* Toast */
        .toast-c{position:fixed;top:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:10px}
        .toast{background:var(--card);border-radius:var(--r-m);box-shadow:var(--sh-l);padding:14px 20px;display:flex;align-items:center;gap:12px;font-size:13px;border-left:3px solid var(--accent);animation:ti .4s ease,to .3s ease 2.5s forwards;min-width:280px}
        .toast.error{border-left-color:var(--rose)}.toast.warning{border-left-color:var(--amber)}
        .toast i{font-size:16px}.toast.success i{color:var(--accent)}.toast.error i{color:var(--rose)}.toast.warning i{color:var(--amber)}
        @keyframes ti{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
        @keyframes to{to{opacity:0;transform:translateX(40px)}}

        .sidebar-ov{display:none;position:fixed;inset:0;background:rgba(45,42,38,.3);z-index:99}
        .sidebar-ov.active{display:block}

        /* 图表 */
        .chart-area{padding:20px 24px}
        .mc{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:10px}
        .mc-bar{flex:1;border-radius:4px 4px 0 0;transition:all .6s ease;cursor:default;min-width:0}
        .mc-bar:hover{opacity:.8}
        .mc-labels{display:flex;gap:6px;margin-top:8px}
        .mc-labels span{flex:1;text-align:center;font-size:11px;color:var(--muted)}

        @media(max-width:1200px){.stats-grid{grid-template-columns:repeat(2,1fr)}.kb-board{grid-template-columns:repeat(2,1fr)}.dg-grid{grid-template-columns:1fr}}
        @media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0);box-shadow:var(--sh-xl)}.main-w{margin-left:0}.mob-btn{display:flex}.pg-c{padding:20px 16px}.top-h{padding:0 16px}.h-search{display:none}.stats-grid{grid-template-columns:1fr}.kb-board{grid-template-columns:1fr}.fr{grid-template-columns:1fr}.cal-day{min-height:60px}.cal-ev{display:none}}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
    <div class="bg-d"></div>

    <!-- 登录 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <div class="login-logo"><i class="fas fa-leaf"></i></div>
            <h2>TaskFlow</h2>
            <p class="sub">员工任务管理系统</p>
            <div class="lg-field">
                <label>用户名</label>
                <input type="text" id="lgUser" placeholder="请输入用户名" value="admin">
            </div>
            <div class="lg-field">
                <label>密码</label>
                <input type="password" id="lgPass" placeholder="请输入密码" value="123456">
            </div>
            <button class="lg-btn" id="lgBtn">登录</button>
            <p class="lg-hint" id="lgErr"></p>
        </div>
    </div>

    <div class="sidebar-ov" id="sidebarOv"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-hd">
            <div class="sidebar-logo"><div class="li"><i class="fas fa-leaf"></i></div><div><div class="lt">TaskFlow</div><div class="ls">任务管理系统</div></div></div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-grp">概览</div>
            <div class="nav-item active" data-page="dashboard"><i class="fas fa-th-large"></i><span>工作台</span></div>
            <div class="nav-grp">任务管理</div>
            <div class="nav-item" data-page="tasks"><i class="fas fa-tasks"></i><span>全部任务</span><span class="nav-badge" id="taskBadge">0</span></div>
            <div class="nav-item" data-page="kanban"><i class="fas fa-columns"></i><span>看板视图</span></div>
            <div class="nav-item" data-page="calendar"><i class="fas fa-calendar-alt"></i><span>日历视图</span></div>
            <div class="nav-grp">团队</div>
            <div class="nav-item" data-page="team"><i class="fas fa-users"></i><span>成员管理</span><span class="nav-badge" style="background:var(--accent-bg);color:var(--accent)" id="memBadge">0</span></div>
            <div class="nav-grp">其他</div>
            <div class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></div>
        </nav>
        <div class="sidebar-ft">
            <div class="sidebar-user"><div class="su-av" id="suAv">管</div><div class="su-info"><div class="su-name" id="suName">管理员</div><div class="su-role" id="suRole">系统管理</div></div></div>
        </div>
    </aside>

    <div class="main-w">
        <header class="top-h">
            <button class="mob-btn" id="mobBtn" aria-label="菜单"><i class="fas fa-bars"></i></button>
            <div class="h-title" id="hTitle">工作台</div>
            <div class="h-search"><i class="fas fa-search"></i><input type="text" placeholder="搜索任务..." id="gSearch"></div>
            <div class="h-actions"><button class="h-btn" id="notifBtn"><i class="fas fa-bell"></i></button></div>
        </header>
        <main class="pg-c">
            <!-- 工作台 -->
            <div class="pg-v active" id="pg-dashboard">
                <div class="dg-greet"><h2 id="greetText">你好</h2><p id="greetSub">加载中...</p></div>
                <div class="stats-g">
                    <div class="st-card sage"><div class="st-icon sage"><i class="fas fa-clipboard-list"></i></div><div class="st-val" id="sTotal">0</div><div class="st-lbl">总任务数</div><div class="st-trend"><i class="fas fa-database"></i> 来自数据库</div></div>
                    <div class="st-card amber"><div class="st-icon amber"><i class="fas fa-spinner"></i></div><div class="st-val" id="sProgress">0</div><div class="st-lbl">进行中</div></div>
                    <div class="st-card rose"><div class="st-icon rose"><i class="fas fa-exclamation-circle"></i></div><div class="st-val" id="sOverdue">0</div><div class="st-lbl">已逾期</div></div>
                    <div class="st-card blue"><div class="st-icon blue"><i class="fas fa-check-circle"></i></div><div class="st-val" id="sDone">0</div><div class="st-lbl">已完成</div></div>
                </div>
                <div class="dg-grid">
                    <div>
                        <div class="sec-card" style="margin-bottom:24px"><div class="sec-hd"><div class="sec-title">近期任务</div><button class="sec-act" onclick="go('tasks')">查看全部</button></div><div class="sec-bd" id="recentTasks"></div></div>
                        <div class="sec-card"><div class="sec-hd"><div class="sec-title">本周完成趋势</div></div><div class="chart-area"><div class="mc" id="wkChart"></div><div class="mc-labels" id="wkLabels"></div></div></div>
                    </div>
                    <div>
                        <div class="sec-card" style="margin-bottom:24px"><div class="sec-hd"><div class="sec-title">团队成员</div><button class="sec-act" onclick="go('team')">管理</button></div><div class="sec-bd" id="teamList"></div></div>
                        <div class="sec-card"><div class="sec-hd"><div class="sec-title">即将到期</div></div><div class="sec-bd" id="upcomingTasks"></div></div>
                    </div>
                </div>
            </div>
            <!-- 全部任务 -->
            <div class="pg-v" id="pg-tasks">
                <div class="filter-bar">
                    <div class="filter-spacer"></div>
                    <button class="filter-chip active" data-f="all" onclick="filt('all',this)">全部</button>
                    <button class="filter-chip" data-f="0" onclick="filt(0,this)">待办</button>
                    <button class="filter-chip" data-f="1" onclick="filt(1,this)">进行中</button>
                    <button class="filter-chip" data-f="2" onclick="filt(2,this)">已完成</button>
                    <button class="filter-chip" data-f="3" onclick="filt(3,this)">已暂停</button>
                    <button class="btn-new" onclick="openModal()"><i class="fas fa-plus"></i> 新建任务</button>
                </div>
                <div class="tt-wrap"><table class="tt"><thead><tr><th style="width:30%">任务名称</th><th>描述</th><th>优先级</th><th>截止日期</th><th>负责人</th><th>状态</th><th style="width:100px">操作</th></tr></thead><tbody id="ttBody"></tbody></table></div>
            </div>
            <!-- 看板 -->
            <div class="pg-v" id="pg-kanban">
                <div class="filter-bar"><div style="font-size:15px;font-weight:600">项目看板</div><div class="filter-spacer"></div><button class="btn-new" onclick="openModal()"><i class="fas fa-plus"></i> 新建任务</button></div>
                <div class="kb-board" id="kbMain"></div>
            </div>
            <!-- 日历 -->
            <div class="pg-v" id="pg-calendar">
                <div class="cal-hd"><div class="cal-nav"><button class="cal-nav-btn" onclick="chMon(-1)"><i class="fas fa-chevron-left"></i></button><div class="cal-month" id="calMon"></div><button class="cal-nav-btn" onclick="chMon(1)"><i class="fas fa-chevron-right"></i></button></div><div class="filter-spacer"></div></div>
                <div class="cal-grid" id="calGrid"></div>
            </div>
            <!-- 团队 -->
            <div class="pg-v" id="pg-team">
                <div class="filter-bar"><div style="font-size:15px;font-weight:600" id="tmTitle">团队成员</div><div class="filter-spacer"></div></div>
                <div class="tm-grid" id="tmGrid"></div>
            </div>
        </main>

    <!-- 模态框 -->
    <div class="modal-ov" id="taskModal">
        <div class="modal">
            <div class="modal-hd"><div class="modal-title" id="mTitle">新建任务</div><button class="modal-close" onclick="closeM()"><i class="fas fa-times"></i></button></div>
            <div class="modal-bd">
                <div class="fg"><label class="fl">任务标题</label><input type="text" class="fi" id="mName" placeholder="输入任务标题..."></div>
                <div class="fg"><label class="fl">任务描述</label><textarea class="fta" id="mDesc" placeholder="输入任务描述..."></textarea></div>
                <div class="fr">
                    <div class="fg"><label class="fl">优先级</label><select class="fs" id="mPri"><option value="1">低</option><option value="2" selected>中</option><option value="3">高</option></select></div>
                    <div class="fg"><label class="fl">负责人</label><select class="fs" id="mAssignee"><option value="">请选择负责人</option></select></div>
                </div>
                <div class="fr">
                    <div class="fg"><label class="fl">截止日期</label><input type="datetime-local" class="fi" id="mDue"></div>
                    <div class="fg"></div>
                </div>
                <div class="f-acts"><button class="fbtn sec" onclick="closeM()">取消</button><button class="fbtn pri" onclick="saveTask()">保存任务</button></div>
            </div>
        </div>
    </div>

    <div class="toast-c" id="toastC"></div>

    <script>
    // ====== 常量：和你后端完全对齐 ======
    // status: 0=待办, 1=进行中, 2=完成, 3=已暂停
    // priority: 1=低, 2=中, 3=高
    // 注意：逾期不再作为status存储值，而是通过isOverdue()根据dueDate动态计算
    const ST = {0:'待办',1:'进行中',2:'完成',3:'已暂停'};
    const ST_CSS = {0:'background:var(--bg-warm);color:var(--fg-s)',1:'background:var(--blue-bg);color:var(--blue)',2:'background:var(--accent-bg);color:var(--accent)',3:'background:var(--amber-bg);color:var(--amber)'};
    const PR = {1:'低',2:'中',3:'高'};
    const PR_CSS = {1:'low',2:'medium',3:'high'};
    const COLORS = ['linear-gradient(135deg,#7C9A82,#A8C4AD)','linear-gradient(135deg,#D4A574,#F0DCC6)','linear-gradient(135deg,#C48B8B,#E8C4C4)','linear-gradient(135deg,#8BA7C4,#BFD0E4)','linear-gradient(135deg,#9B8EC4,#C4BFE4)','linear-gradient(135deg,#C4B08B,#E4D8BF)','linear-gradient(135deg,#8BC4B0,#BFE4D8)','linear-gradient(135deg,#C48B9B,#E4BFC8)'];

    let tasks = [], members = [], curUser = null, curFilter = 'all', editId = null, calDate = new Date();

    // ====== 数据规范化：确保status/priority始终为数字类型 ======
    function normalizeTask(t) {
        if (!t) return t;
        t.status = t.status != null ? Number(t.status) : 0;
        t.priority = t.priority != null ? Number(t.priority) : 2;
        t.assigneeId = t.assigneeId != null ? Number(t.assigneeId) : null;
        return t;
    }

    // ====== API ======
    async function api(url, opts = {}) {
        try {
            const r = await fetch(url, {headers:{'Content-Type':'application/json'}, ...opts});
            if (!r.ok) throw new Error(r.status);
            const t = await r.text();
            if (!t) return null;
            // 后端可能返回统一格式 {code, message, data} 或直接返回 List/String
            try {
                const j = JSON.parse(t);
                // 如果是统一响应格式，检查code
                if (j && typeof j === 'object' && 'code' in j) {
                    if (j.code === 200) return j.data;
                    else throw new Error(j.message || '操作失败');
                }
                return j;
            } catch(e) {
                if (e.message && e.message !== 'Unexpected token') throw e;
                return t;
            }
        } catch(e) {
            console.warn('API:', url, e.message);
            toast(e.message || '请求失败', 'error');
            return null;
        }
    }

    // ====== 登录 ======
    async function doLogin() {
        const u = document.getElementById('lgUser').value.trim();
        const p = document.getElementById('lgPass').value.trim();
        if (!u || !p) { document.getElementById('lgErr').textContent = '请输入用户名和密码'; return; }
        const res = await api('/api/employees/login', {method:'POST', body:JSON.stringify({username:u, password:p})});
        if (res && typeof res === 'object' && res.id) {
            curUser = res;
            localStorage.setItem('user', JSON.stringify(res));
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('suAv').textContent = (res.name||'?').charAt(0);
            document.getElementById('suName').textContent = res.name || res.username;
            document.getElementById('suRole').textContent = res.department || '员工';
            toast('登录成功','success');
            await loadAll();
        } else {
            document.getElementById('lgErr').textContent = '登录失败，请检查用户名和密码';
        }
    }
    document.getElementById('lgBtn').addEventListener('click', doLogin);
    document.getElementById('lgPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
    document.getElementById('lgUser').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('lgPass').focus(); });

    // ====== 数据加载 ======
    async function loadTasks(keyword) {
        const params = new URLSearchParams();
        if (curUser) params.set('assigneeId', curUser.id);
        if (keyword) params.set('keyword', keyword);
        const qs = params.toString();
        const raw = await api('/api/tasks' + (qs ? '?' + qs : ''));
        tasks = (Array.isArray(raw) ? raw : []).map(normalizeTask);
    }
    async function loadMembers() {
        const raw = await api('/api/employees');
        members = Array.isArray(raw) ? raw : [];
    }
    async function loadAll() {
        await loadMembers();
        await loadTasks();
        renderAll();
    }

    // ====== 工具 ======
    function ini(n) { return n ? n.charAt(0) : '?'; }
    function fmtDate(d) {
        if (!d) return '未设置';
        const dt = new Date(d);
        if (isNaN(dt.getTime())) return d;
        return `${dt.getMonth()+1}月${dt.getDate()}日`;
    }
    function isOverdue(d) { return d && new Date(d) < new Date(new Date().toDateString()); }
    function getMember(id) { return members.find(m => m.id === id) || {name:'未知', department:'', color: COLORS[0]}; }
    function toast(msg, type='success') {
        const c = document.getElementById('toastC');
        const icons = {success:'fa-check-circle',error:'fa-times-circle',warning:'fa-exclamation-circle'};
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = `<i class="fas ${icons[type]}"></i><span>${msg}</span>`;
        c.appendChild(t);
        setTimeout(() => { if(t.parentNode) t.remove(); }, 3000);
    }

    // ====== 页面切换 ======
    function go(p) {
        document.querySelectorAll('.pg-v').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item[data-page]').forEach(n => n.classList.remove('active'));
        const el = document.getElementById('pg-'+p);
        if(el) el.classList.add('active');
        const nav = document.querySelector(`.nav-item[data-page="${p}"]`);
        if(nav) nav.classList.add('active');
        const titles = {dashboard:'工作台',tasks:'全部任务',kanban:'看板视图',calendar:'日历视图',team:'成员管理'};
        document.getElementById('hTitle').textContent = titles[p]||'工作台';
        closeSB();
        if(p==='dashboard') renderDash();
        if(p==='tasks') renderTable();
        if(p==='kanban') renderKB('kbMain');
        if(p==='calendar') renderCal();
        if(p==='team') renderTeam();
    }
    document.querySelectorAll('.nav-item[data-page]').forEach(i => i.addEventListener('click', () => go(i.dataset.page)));

    // ====== 仪表盘 ======
    async function renderDash() {
        const h = new Date().getHours();
        let g = '早上好'; if(h>=12&&h<14)g='中午好'; else if(h>=14&&h<18)g='下午好'; else if(h>=18)g='晚上好';
        document.getElementById('greetText').textContent = `${g}，${curUser?.name||'用户'}`;

        // 尝试从后端获取统计数据
        const statsParams = curUser ? `?assigneeId=${curUser.id}` : '';
        const stats = await api('/api/tasks/statistics' + statsParams);
        let total=0, prog=0, overdue=0, done=0, paused=0;
        if (stats && typeof stats === 'object') {
            total = stats.total || 0;
            prog = stats.inProgress || 0;
            overdue = stats.overdue || 0;
            done = stats.completed || 0;
            paused = stats.paused || 0;
        } else {
            // 降级：前端本地计算
            const pending = tasks.filter(t=>t.status!==2).length;
            prog = tasks.filter(t=>t.status===1).length;
            paused = tasks.filter(t=>t.status===3).length;
            overdue = tasks.filter(t=>t.status!==2&&isOverdue(t.dueDate)).length;
            done = tasks.filter(t=>t.status===2).length;
            total = tasks.length;
        }

        const pending = total - done;
        document.getElementById('sTotal').textContent = total;
        document.getElementById('sProgress').textContent = prog;
        document.getElementById('sOverdue').textContent = overdue;
        document.getElementById('sDone').textContent = done;
        document.getElementById('greetSub').textContent = `共 ${total} 个任务，${pending} 个待处理，${overdue} 个已逾期，${paused} 个已暂停`;
        document.getElementById('taskBadge').textContent = pending;
        document.getElementById('memBadge').textContent = members.length;

        // 近期任务
        const re = document.getElementById('recentTasks');
        const rt = tasks.filter(t=>t.status!==2).slice(0,5);
        re.innerHTML = rt.length ? rt.map(t => {
            const m = getMember(t.assigneeId);
            let dashActions = '';
        const ds = Number(t.status);
        if(ds===0) dashActions = `<span style="font-size:11px;color:var(--blue);cursor:pointer;font-weight:500" onclick="changeStatus(${t.id},1)"><i class="fas fa-play"></i> 开始</span>`;
        else if(ds===1) dashActions = `<span style="font-size:11px;color:var(--accent);cursor:pointer;font-weight:500" onclick="changeStatus(${t.id},2)"><i class="fas fa-check"></i> 完成</span>`;
        else if(ds===3) dashActions = `<span style="font-size:11px;color:var(--blue);cursor:pointer;font-weight:500" onclick="changeStatus(${t.id},1)"><i class="fas fa-play"></i> 继续</span>`;
        else if(ds===2) dashActions = `<span style="font-size:11px;color:var(--muted);cursor:pointer;font-weight:500" onclick="changeStatus(${t.id},0)"><i class="fas fa-undo"></i> 重开</span>`;
        return `<div class="tk-item"><div class="tk-chk ${t.status===2?'on':''}" onclick="toggleDone(${t.id},event)"></div><div class="tk-info"><div class="tk-name">${t.title||'未命名'}</div><div class="tk-meta"><span><i class="fas fa-user"></i> ${m.name}</span><span><i class="fas fa-clock"></i> ${fmtDate(t.dueDate)}${isOverdue(t.dueDate)?' <span style="color:var(--rose)">已逾期</span>':''}</span></div></div>${dashActions}<span class="tk-pri ${PR_CSS[t.priority]||'medium'}">${PR[t.priority]||'中'}</span></div>`;
        }).join('') : '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">暂无待处理任务</div>';

        // 团队
        const tl = document.getElementById('teamList');
        const uniqueMembers = [];
        tasks.forEach(t => { if(t.assigneeId && !uniqueMembers.find(m=>m.id===t.assigneeId)) { const em = getMember(t.assigneeId); if(em.name!=='未知') uniqueMembers.push({...em, _done: tasks.filter(x=>x.assigneeId===t.assigneeId&&x.status===2).length, _total: tasks.filter(x=>x.assigneeId===t.assigneeId).length}); }});
        tl.innerHTML = uniqueMembers.length ? uniqueMembers.slice(0,6).map(m => {
            const p = m._total>0?Math.round(m._done/m._total*100):0;
            return `<div class="tm-item"><div class="tm-av" style="background:${m.color||COLORS[0]}">${ini(m.name)}</div><div class="tm-info"><div class="tm-name">${m.name}</div><div class="tm-tasks">${m._done}/${m._total} 任务完成</div><div class="prog-w"><div class="prog-bg"><div class="prog-fill" style="width:${p}%;background:var(--accent)"></div></div></div></div></div>`;
        }).join('') : '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">暂无成员数据</div>';

        // 即将到期（优先从后端获取）
        const ue = document.getElementById('upcomingTasks');
        const upcomingParams = curUser ? `?assigneeId=${curUser.id}&limit=4` : '?limit=4';
        const upcomingData = await api('/api/tasks/upcoming' + upcomingParams);
        const ut = Array.isArray(upcomingData) && upcomingData.length > 0 ? upcomingData
            : tasks.filter(t=>t.status!==2).sort((a,b)=>new Date(a.dueDate||'2099')-new Date(b.dueDate||'2099')).slice(0,4);
        ue.innerHTML = ut.length ? ut.map(t => {
            const od = isOverdue(t.dueDate);
            return `<div class="tk-item"><div style="width:4px;height:36px;border-radius:2px;background:${od?'var(--rose)':'var(--amber)'};flex-shrink:0"></div><div class="tk-info"><div class="tk-name" style="font-size:13px">${t.title||'未命名'}</div><div class="tk-meta"><span style="${od?'color:var(--rose);font-weight:500':''}"><i class="fas fa-clock"></i> ${od?'已逾期':fmtDate(t.dueDate)}</span></div></div></div>`;
        }).join('') : '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">暂无即将到期任务</div>';

        // 周图表（从后端获取真实数据）
        const trendParams = curUser ? `?assigneeId=${curUser.id}` : '';
        const trendData = await api('/api/tasks/weekly-trend' + trendParams);
        const data = [0,0,0,0,0,0,0];
        const days = ['周一','周二','周三','周四','周五','周六','周日'];
        if (Array.isArray(trendData) && trendData.length > 0) {
            trendData.forEach(item => {
                // item.day 是 "2026-04-27" 格式，计算是本周第几天
                const d = new Date(item.day);
                let dayIdx = d.getDay() - 1; // 周一=0, 周日=6
                if (dayIdx < 0) dayIdx = 6; // 周日
                data[dayIdx] = item.count || 0;
            });
        } else {
            // 降级：使用本地计算
            data[new Date().getDay()===0?6:new Date().getDay()-1] = done||3;
        }
        const mx = Math.max(...data, 1);
        const today = new Date().getDay();
        document.getElementById('wkChart').innerHTML = data.map((v,i) => {
            const isT = today===(i+1)%7||(i===6&&today===0);
            return `<div class="mc-bar" style="height:${Math.max(4,v/mx*100)}%;background:${isT?'var(--accent)':'var(--accent-l)'};opacity:${isT?1:0.6}" title="${days[i]}: ${v}"></div>`;
        }).join('');
        document.getElementById('wkLabels').innerHTML = days.map((d,i) => {
            const isT = today===(i+1)%7||(i===6&&today===0);
            return `<span style="${isT?'color:var(--accent);font-weight:600':''}">${d}</span>`;
        }).join('');
    }

    // ====== 任务表格 ======
    function filt(f, el) {
        curFilter = f;
        document.querySelectorAll('.filter-chip[data-f]').forEach(c => c.classList.remove('active'));
        if(el) el.classList.add('active');
        renderTable();
    }
    function renderTable() {
        const tb = document.getElementById('ttBody');
        let list = curFilter==='all' ? tasks : tasks.filter(t => Number(t.status) === parseInt(curFilter));
        if(!list.length) { tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)">暂无任务数据</td></tr>'; return; }
        tb.innerHTML = list.map(t => {
            const m = getMember(t.assigneeId);
            const s = Number(t.status);
            const od = s!==2 && isOverdue(t.dueDate);
            return `<tr><td style="font-weight:500">${t.title||'未命名'}</td><td style="font-size:13px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description||'-'}</td><td><span class="tk-pri ${PR_CSS[t.priority]||'medium'}">${PR[t.priority]||'中'}</span></td><td><span style="font-size:13px;${od?'color:var(--rose);font-weight:500':'color:var(--fg-s)'}">${fmtDate(t.dueDate)}</span>${od?'<div style="font-size:11px;color:var(--rose)">已逾期</div>':''}</td><td><div class="tt-assignee"><div class="tt-av" style="background:${m.color||COLORS[0]}">${ini(m.name)}</div><span style="font-size:13px">${m.name}</span></div></td><td><span class="st-badge" style="${ST_CSS[s]||''}">${ST[s]||'未知'}</span></td><td><div class="act-cell">${statusActions(t)}</div></td></tr>`;
        }).join('');
    }

    // ====== 看板 ======
    function renderKB(cid) {
        const c = document.getElementById(cid); if(!c) return;
        const cols = [{k:0,l:'待办',c:'var(--fg-s)'},{k:1,l:'进行中',c:'var(--blue)'},{k:3,l:'已暂停',c:'var(--amber)'},{k:2,l:'已完成',c:'var(--accent)'}];
        c.innerHTML = cols.map(col => {
            const ct = tasks.filter(t => Number(t.status) === col.k);
            return `<div class="kb-col" data-status="${col.k}" ondragover="event.preventDefault();this.style.background='var(--accent-bg)'" ondragleave="this.style.background=''" ondrop="dropTK(event,${col.k});this.style.background=''"><div class="kb-col-hd"><div class="kb-col-title"><span class="kb-col-dot" style="background:${col.c}"></span>${col.l}</div><span class="kb-col-cnt">${ct.length}</span></div><div class="kb-cards">${ct.map(t => { const m = getMember(t.assigneeId); const ks = Number(t.status); let kbActions = ''; if(ks===0) kbActions = `<span style="cursor:pointer;color:var(--blue)" onclick="changeStatus(${t.id},1)" title="开始"><i class="fas fa-play"></i></span>`; else if(ks===1) kbActions = `<span style="cursor:pointer;color:var(--accent)" onclick="changeStatus(${t.id},2)" title="完成"><i class="fas fa-check"></i></span> <span style="cursor:pointer;color:var(--amber)" onclick="changeStatus(${t.id},3)" title="暂停"><i class="fas fa-pause"></i></span>`; else if(ks===3) kbActions = `<span style="cursor:pointer;color:var(--blue)" onclick="changeStatus(${t.id},1)" title="继续"><i class="fas fa-play"></i></span>`; else if(ks===2) kbActions = `<span style="cursor:pointer;color:var(--muted)" onclick="changeStatus(${t.id},0)" title="重开"><i class="fas fa-undo"></i></span>`; return `<div class="kb-card" draggable="true" data-id="${t.id}" ondragstart="event.dataTransfer.setData('text/plain','${t.id}')"><div class="kb-card-t">${t.title||'未命名'}</div><div class="kb-card-ft"><div class="kb-card-assignee"><div class="kb-card-av" style="background:${m.color||COLORS[0]}">${ini(m.name)}</div><span>${m.name}</span></div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px">${fmtDate(t.dueDate)}</span>${kbActions}</div></div></div>`; }).join('')}</div><button class="kb-add" onclick="openModal(null,${col.k})"><i class="fas fa-plus"></i> 添加任务</button></div>`;
        }).join('');
    }
    async function dropTK(e, ns) {
        e.preventDefault();
        const id = e.dataTransfer.getData('text/plain');
        const ok = await api(`/api/tasks/${id}/status?status=${ns}`, {method:'PUT'});
        if(ok !== null) { toast(`任务已移至「${ST[ns]}」`,'success'); await loadTasks(); renderAll(); }
        else toast('状态更新失败','error');
    }

    // ====== 日历 ======
    function renderCal() {
        const y=calDate.getFullYear(), mo=calDate.getMonth();
        const mn=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
        document.getElementById('calMon').textContent = `${y}年 ${mn[mo]}`;
        const g = document.getElementById('calGrid');
        const wd=['日','一','二','三','四','五','六'];
        const fd=new Date(y,mo,1).getDay(), dim=new Date(y,mo+1,0).getDate(), dpm=new Date(y,mo,0).getDate(), td=new Date();
        let h='<div class="cal-wk">'+wd.map(d=>`<div>${d}</div>`).join('')+'</div><div class="cal-days">';
        for(let i=fd-1;i>=0;i--) h+=`<div class="cal-day om"><div class="dn">${dpm-i}</div></div>`;
        for(let d=1;d<=dim;d++){
            const isT=y===td.getFullYear()&&mo===td.getMonth()&&d===td.getDate();
            const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dt=tasks.filter(t=>t.dueDate&&t.dueDate.startsWith(ds));
            h+=`<div class="cal-day${isT?' today':''}"><div class="dn">${d}</div>${dt.slice(0,3).map(t=>`<div class="cal-ev" style="background:${(ST_CSS[t.status]||'').split(';')[0].replace('background:','')};${(ST_CSS[t.status]||'').split(';').slice(1).join(';')}" title="${t.title}">${t.title||'未命名'}</div>`).join('')}${dt.length>3?`<div style="font-size:11px;color:var(--muted);padding-left:6px">+${dt.length-3}</div>`:''}</div>`;
        }
        const tc=fd+dim, rm=(7-(tc%7))%7;
        for(let i=1;i<=rm;i++) h+=`<div class="cal-day om"><div class="dn">${i}</div></div>`;
        h+='</div>'; g.innerHTML=h;
    }
    function chMon(d){calDate.setMonth(calDate.getMonth()+d);renderCal();}

    // ====== 团队 ======
    function renderTeam() {
        document.getElementById('tmTitle').textContent = `团队成员 (${members.length}人)`;
        const g = document.getElementById('tmGrid');
        if(!members.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)">暂无成员数据</div>';return;}
        g.innerHTML = members.map((m,i) => {
            const mt = tasks.filter(t=>t.assigneeId===m.id);
            const md = mt.filter(t=>t.status===2).length;
            return `<div class="tm-card"><div class="tm-card-av" style="background:${COLORS[i%COLORS.length]}">${ini(m.name)}</div><div class="tm-card-name">${m.name}</div><div class="tm-card-role">${m.department||'未分组'}</div><div style="margin-bottom:16px"><div class="prog-w" style="margin-top:8px"><div class="prog-bg" style="height:6px"><div class="prog-fill" style="width:${mt.length?Math.round(md/mt.length*100):0}%;background:${COLORS[i%COLORS.length]}"></div></div><div style="font-size:11px;color:var(--muted);margin-top:4px">任务完成率 ${mt.length?Math.round(md/mt.length*100):0}%</div></div><div class="tm-card-stats"><div class="tm-card-st"><div class="tm-card-sv">${mt.length}</div><div class="tm-card-sl">总任务</div></div><div class="tm-card-st"><div class="tm-card-sv" style="color:var(--accent)">${md}</div><div class="tm-card-sl">已完成</div></div><div class="tm-card-st"><div class="tm-card-sv" style="color:var(--amber)">${mt.length-md}</div><div class="tm-card-sl">进行中</div></div></div></div>`;
        }).join('');
    }

    // ====== 模态框 ======
    // 加载负责人下拉选项
    function loadAssigneeOptions() {
        const sel = document.getElementById('mAssignee');
        const currentVal = sel.value;
        sel.innerHTML = '<option value="">请选择负责人</option>';
        members.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = m.name + (m.department ? ' (' + m.department + ')' : '');
            sel.appendChild(opt);
        });
        if (currentVal) sel.value = currentVal;
    }

    function openModal(id, defStatus) {
        editId = id||null;
        document.getElementById('mTitle').textContent = id?'编辑任务':'新建任务';
        loadAssigneeOptions(); // 每次打开都刷新负责人列表
        if(id) {
            const t = tasks.find(x=>x.id===id); if(!t) return;
            document.getElementById('mName').value = t.title||'';
            document.getElementById('mDesc').value = t.description||'';
            document.getElementById('mPri').value = t.priority||2;
            document.getElementById('mDue').value = t.dueDate ? t.dueDate.slice(0,16) : '';
            document.getElementById('mAssignee').value = t.assigneeId || '';
        } else {
            document.getElementById('mName').value = '';
            document.getElementById('mDesc').value = '';
            document.getElementById('mPri').value = '2';
            document.getElementById('mDue').value = '';
            // 新建任务默认选中当前用户为负责人
            document.getElementById('mAssignee').value = curUser ? curUser.id : '';
        }
        document.getElementById('taskModal').classList.add('active');
        setTimeout(()=>document.getElementById('mName').focus(),200);
    }
    function closeM(){ document.getElementById('taskModal').classList.remove('active'); editId=null; }
    function editTask(id){ openModal(id); }

    async function saveTask() {
        const title = document.getElementById('mName').value.trim();
        if(!title){ toast('请输入任务标题','warning'); return; }
        const assigneeIdVal = document.getElementById('mAssignee').value;
        const payload = {
            title: title,
            description: document.getElementById('mDesc').value.trim(),
            priority: parseInt(document.getElementById('mPri').value)||2,
            assigneeId: assigneeIdVal ? parseInt(assigneeIdVal) : null,
            dueDate: document.getElementById('mDue').value ? document.getElementById('mDue').value.replace('T',' ')+':00' : null
        };
        let ok;
        if(editId) {
            payload.id = editId;
            ok = await api('/api/tasks', {method:'PUT', body:JSON.stringify(payload)});
        } else {
            payload.status = 0;
            // 如果没选负责人，默认设为当前用户
            if(!payload.assigneeId && curUser) payload.assigneeId = curUser.id;
            ok = await api('/api/tasks', {method:'POST', body:JSON.stringify(payload)});
        }
        if(ok !== null) { toast(editId?'任务已更新':'任务已创建','success'); closeM(); await loadTasks(); renderAll(); }
        else toast('保存失败，请检查后端','error');
    }

    async function delTask(id) {
        if(!confirm('确定删除这个任务吗？')) return;
        const ok = await api(`/api/tasks/${id}`, {method:'DELETE'});
        if(ok !== null) { toast('任务已删除','success'); await loadTasks(); renderAll(); }
        else toast('删除失败','error');
    }

    async function toggleDone(id, e) {
        e.stopPropagation();
        const t = tasks.find(x=>x.id===id); if(!t) return;
        const ns = t.status===2 ? 0 : 2;
        const ok = await api(`/api/tasks/${id}/status?status=${ns}`, {method:'PUT'});
        if(ok !== null) { toast(ns===2?'任务已完成':'任务已恢复','success'); await loadTasks(); renderAll(); }
    }

    // 根据任务当前状态生成操作按钮
    function statusActions(t) {
        let btns = '';
        const s = t.status != null ? Number(t.status) : 0;
        // 编辑按钮 - 所有状态都有
        btns += `<button class="act-btn" title="编辑" onclick="editTask(${t.id})"><i class="fas fa-pen"></i></button>`;
        // 状态流转按钮（完整的状态机）
        if (s === 0) {
            // 待办 -> 开始(进行中)
            btns += `<button class="act-btn start" title="开始任务" onclick="changeStatus(${t.id},1)"><i class="fas fa-play"></i></button>`;
        } else if (s === 1) {
            // 进行中 -> 暂停
            btns += `<button class="act-btn pause" title="暂停" onclick="changeStatus(${t.id},3)"><i class="fas fa-pause"></i></button>`;
            // 进行中 -> 完成
            btns += `<button class="act-btn done" title="完成任务" onclick="changeStatus(${t.id},2)"><i class="fas fa-check"></i></button>`;
        } else if (s === 3) {
            // 已暂停 -> 继续(进行中)
            btns += `<button class="act-btn start" title="继续任务" onclick="changeStatus(${t.id},1)"><i class="fas fa-play"></i></button>`;
        } else if (s === 2) {
            // 已完成 -> 重新打开(待办)
            btns += `<button class="act-btn reopen" title="重新打开" onclick="changeStatus(${t.id},0)"><i class="fas fa-undo"></i></button>`;
        } else {
            // 未知状态 -> 重置为待办
            btns += `<button class="act-btn start" title="开始任务" onclick="changeStatus(${t.id},1)"><i class="fas fa-play"></i></button>`;
        }
        // 删除按钮 - 所有状态都有
        btns += `<button class="act-btn del" title="删除" onclick="delTask(${t.id})"><i class="fas fa-trash"></i></button>`;
        return btns;
    }

    async function changeStatus(id, newStatus) {
        const ok = await api(`/api/tasks/${id}/status?status=${newStatus}`, {method:'PUT'});
        if(ok !== null) { toast(`任务已更新为「${ST[newStatus]}」`,'success'); await loadTasks(); renderAll(); }
        else toast('状态更新失败','error');
    }

    function renderAll(){ renderDash(); renderTable(); renderKB('kbMain'); renderCal(); renderTeam(); }

    // ====== 侧边栏 ======
    function closeSB(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOv').classList.remove('active'); }
    document.getElementById('mobBtn').addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOv').classList.toggle('active'); });
    document.getElementById('sidebarOv').addEventListener('click', closeSB);
    document.getElementById('taskModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeM(); });
    document.addEventListener('keydown', e => {
        if(e.key==='Escape'){ closeM(); closeSB(); }
        if((e.ctrlKey||e.metaKey)&&e.key==='k'){ e.preventDefault(); document.getElementById('gSearch').focus(); }
    });
    document.getElementById('notifBtn').addEventListener('click', () => toast('暂无新通知','success'));
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('user');
        curUser = null;
        document.getElementById('loginOverlay').classList.remove('hidden');
        toast('已退出登录','warning');
    });

    // 搜索（改用后端keyword参数）
    document.getElementById('gSearch').addEventListener('input', function() {
        const q = this.value.trim().toLowerCase();
        if(!q){ curFilter='all'; loadTasks().then(()=>renderTable()); return; }
        // 使用后端搜索接口
        loadTasks(q).then(() => {
            go('tasks');
            renderTable();
        });
    });

    // ====== 启动 ======
    (async function() {
        const saved = localStorage.getItem('user');
        if(saved) {
            try {
                curUser = JSON.parse(saved);
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('suAv').textContent = (curUser.name||'?').charAt(0);
                document.getElementById('suName').textContent = curUser.name || curUser.username;
                document.getElementById('suRole').textContent = curUser.department || '员工';
                await loadAll();
            } catch(e) { localStorage.removeItem('user'); }
        }
    })();
    </script>
</body>
</html>
